title: Lab - Ingress Tool Transfer via Certutil or Bitsadmin
id: 1a2b3c4d-5e6f-7890-abcd-ef1234567803
status: experimental
description: Detects common LOLBins used to download secondary payloads (lab rule).
author: IR Lab
date: 2024/10/12
references:
  - https://attack.mitre.org/techniques/T1105/
logsource:
  category: process_creation
  product: windows
detection:
  selection_certutil:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-urlcache'
      - '-split'
      - 'http'
  selection_bits:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
      - 'http'
  condition: 1 of selection_*
falsepositives:
  - Software deployment utilities
level: medium
tags:
  - attack.command_and_control
  - attack.t1105
