title: Lab - Credential Access via Known Dumping Patterns
id: 9e4d3c2b-5a6f-7081-92ab-cdef0123402
status: experimental
description: Detects command lines consistent with LSASS/SAM/NTDS dumping techniques (lab rule).
author: IR Lab
date: 2024/10/12
references:
  - https://attack.mitre.org/techniques/T1003/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'sekurlsa::'
      - 'lsadump::'
      - 'comsvcs.dll, MiniDump'
      - 'MiniDump'
      - 'procdump'
      - ' -ma lsass'
      - 'ntdsutil'
      - 'ntds.dit'
  condition: selection
falsepositives:
  - Rare authorized forensics tooling
level: critical
tags:
  - attack.credential_access
  - attack.t1003
